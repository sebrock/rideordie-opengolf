name: License review
description: Review a dependency, dataset, API, asset, or service for open-source compatibility
title: "[License Review]: "
labels:
  - license-review/required
  - priority/triage
body:
  - type: markdown
    attributes:
      value: |
        Ride or Die Scorecard is open-source-first. Use this template before adding dependencies, datasets, APIs, generated assets, fonts, map/course data, or hosted services.
  - type: input
    id: component-name
    attributes:
      label: Component / source name
      placeholder: "OpenStreetMap, BTCPay Server, Nostr SDK, course dataset, icon pack, etc."
    validations:
      required: true
  - type: input
    id: source-url
    attributes:
      label: Source URL
      placeholder: "https://..."
    validations:
      required: false
  - type: dropdown
    id: component-type
    attributes:
      label: Component type
      options:
        - Software dependency
        - Dataset
        - API/service
        - Image/illustration/icon
        - Font
        - Documentation/source text
        - Map/course data
        - Other
    validations:
      required: true
  - type: input
    id: stated-license
    attributes:
      label: Stated license
      placeholder: "MIT, Apache-2.0, AGPL-3.0, ODbL-1.0, CC-BY-4.0, unknown, etc."
    validations:
      required: true
  - type: textarea
    id: intended-use
    attributes:
      label: Intended use in this project
      description: Where will it be used and distributed?
    validations:
      required: true
  - type: checkboxes
    id: compatibility
    attributes:
      label: Review checklist
      options:
        - label: License allows open-source redistribution
        - label: License allows commercial/event/sponsor use
        - label: Attribution requirements are understood
        - label: Share-alike/copyleft obligations are understood
        - label: Data rights are clear enough for course-data use
        - label: No proprietary lock-in is introduced
        - label: Alternative open-source options were considered
  - type: textarea
    id: decision
    attributes:
      label: Proposed decision
      placeholder: "Accept / reject / needs legal review / needs replacement."
    validations:
      required: false
